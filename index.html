<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Just Smile ✨</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;900&family=Amiri:ital@1&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <!-- Supabase JS Client v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --spring-transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --brutal-black: #1a0f0a;
            --bg-color: #2b1810;
        }
        
        body.night-mode {
            --bg-color: #0d0705;
        }
        body {
            font-family: 'Plus Jakarta Sans', 'Cairo', sans-serif;
            background-color: var(--bg-color); 
            min-height: 100vh;
            transition: background-color 0.5s ease;
        }
        
        .arcade-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--brutal-black);
            box-shadow: 6px 6px 0px 0px var(--brutal-black);
            transition: var(--spring-transition);
        }
        body.night-mode .arcade-card {
            background: #1e120c;
            border-color: #ffb703;
            box-shadow: 6px 6px 0px 0px #ffb703;
            color: #f8fafc;
        }
        .arcade-card:hover {
            transform: translate(-2px, -2px);
        }
        body:not(.night-mode) .arcade-card:hover { box-shadow: 8px 8px 0px 0px var(--brutal-black); }
        body.night-mode .arcade-card:hover { box-shadow: 8px 8px 0px 0px #ffb703; }

        .arcade-btn {
            border: 3px solid var(--brutal-black);
            box-shadow: 3px 3px 0px 0px var(--brutal-black);
            transition: var(--spring-transition);
        }
        body.night-mode .arcade-btn {
            border-color: #ffb703;
            box-shadow: 3px 3px 0px 0px #ffb703;
            background-color: #2b1810;
            color: #fff;
        }
        .arcade-btn:hover {
            transform: translate(-1px, -1px);
        }
        body:not(.night-mode) .arcade-btn:hover { box-shadow: 4px 4px 0px 0px var(--brutal-black); }
        body.night-mode .arcade-btn:hover { box-shadow: 4px 4px 0px 0px #ffb703; }
        .arcade-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px transparent;
        }
        
        .arcade-input {
            border: 3px solid var(--brutal-black);
            box-shadow: 3px 3px 0px 0px rgba(26, 15, 10, 0.15);
        }
        body.night-mode .arcade-input {
            border-color: #ffb703;
            background-color: #2b1810;
            color: #fff;
        }

        .aura-green { background: linear-gradient(135deg, #e6f4ea 0%, #baf3cd 100%) !important; color: #0f5132 !important; }
        .aura-champagne { background: linear-gradient(135deg, #fef9e7 0%, #fdeca6 100%) !important; color: #7d6608 !important; }
        .aura-pink { background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%) !important; color: #880e4f !important; }
        .aura-purple { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%) !important; color: #4a148c !important; }
        .aura-red { background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%) !important; color: #c62828 !important; }
        .aura-darkred { background: linear-gradient(135deg, #3e2723 0%, #5d4037 100%) !important; color: #ff8a80 !important; }

        .poem-layout {
            font-family: 'Amiri', serif;
            line-height: 2.3;
        }
        
        .font-arcade {
            font-family: 'Press Start 2P', cursive, sans-serif;
        }

        @keyframes cookieCrack {
            0% { transform: scale(1) rotate(0deg); }
            20% { transform: scale(1.1) rotate(-5deg); }
            40% { transform: scale(1.1) rotate(5deg); }
            60% { transform: scale(0.9) blur(1px); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .animate-crack {
            animation: cookieCrack 0.6s ease-in-out;
        }

        @keyframes tickerEffect {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }
        .animate-ticker {
            display: inline-block;
            white-space: nowrap;
            animation: tickerEffect 35s linear infinite;
        }
        .animate-ticker:hover {
            animation-play-state: paused;
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #1a0f0a; }
        ::-webkit-scrollbar-thumb { background: #d4a373; border: 3px solid #1a0f0a; border-radius: 6px; }
    </style>
</head>
<body class="p-3 md:p-8 antialiased selection:bg-yellow-400 selection:text-black">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- ========================================================= -->
        <!-- NAVIGATION HEADER INTERFACE                               -->
        <!-- ========================================================= -->
        <header class="arcade-card bg-[#eddcd2] rounded-3xl p-6 relative overflow-hidden flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="space-y-2 text-center md:text-left rtl:text-right max-w-2xl">
                <h1 id="hero-title" class="text-3xl md:text-5xl font-black tracking-tight text-[#1a0f0a] dark-target-text">
                    ✨ Just Smile ✨
                </h1>
                <p id="hero-desc" class="text-sm md:text-base font-bold text-slate-800 dark-target-text"></p>
            </div>

            <div class="flex flex-wrap items-center gap-3 shrink-0 z-10">
                <button onclick="toggleNightModeState()" id="night-toggle-btn" class="px-4 py-2 bg-slate-900 text-white border-2 border-slate-900 rounded-xl text-xs font-black arcade-btn cursor-pointer shadow-[2px_2px_0px_0px_rgba(255,255,255,0.2)] hover:scale-105 active:scale-95 transition-all">
                    🌙 Night Mode
                </button>

                <div class="flex items-center bg-white p-1.5 rounded-xl border-3 border-[#1a0f0a] shadow-[3px_3px_0px_0px_#1a0f0a] id-lang-wrap">
                    <button onclick="switchLanguage('en')" id="lang-btn-en" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all cursor-pointer">EN</button>
                    <button onclick="switchLanguage('fr')" id="lang-btn-fr" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all cursor-pointer">FR</button>
                    <button onclick="switchLanguage('ar')" id="lang-btn-ar" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all cursor-pointer">العربية</button>
                </div>
            </div>
        </header>

        <!-- ========================================================= -->
        <!-- LIVE TOAST TICKER FEED MARQUEE SECTION                    -->
        <!-- ========================================================= -->
        <div id="live-marquee-container" class="arcade-card bg-slate-900 text-yellow-300 rounded-xl py-2 px-4 overflow-hidden border-2 flex items-center hidden">
            <span class="font-arcade text-[8px] bg-red-600 text-white px-1.5 py-0.5 rounded mr-3 uppercase shrink-0 animate-pulse">Feed</span>
            <div class="w-full overflow-hidden relative">
                <div id="live-ticker-track" class="animate-ticker text-xs font-mono font-bold tracking-wide"></div>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- INTERACTIVE LOG-IN PORTAL ACCESSIBILITY                   -->
        <!-- ========================================================= -->
        <section id="auth-section" class="arcade-card bg-[#f3e5f5] rounded-3xl p-6 md:p-10 max-w-md mx-auto space-y-6 border-4">
            <div class="text-center space-y-2">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-[#ce93d8] border-3 border-[#1a0f0a] shadow-[4px_4px_0px_0px_#1a0f0a] rounded-2xl text-2xl mb-2 animate-bounce-soft">✨</div>
                <h2 class="text-xl md:text-2xl font-black text-[#4a148c] tracking-tight id-purple-title">✨ I loVE seeing you smile ✨</h2>
                <p id="auth-subtitle" class="text-xs font-bold text-[#6a1b9a] id-purple-sub"></p>
            </div>

            <form id="auth-form" class="space-y-4" onsubmit="handleAuthenticationPipeline(event)">
                <div class="relative">
                    <label id="label-fullname" class="block text-xs font-black text-[#4a148c] id-purple-lbl mb-1 uppercase tracking-wider">Select Your Identity</label>
                    <input type="text" id="auth-fullname-input" autocomplete="off" oninput="handleAutocompleteSearch(this.value)" class="w-full px-4 py-3 bg-white arcade-input rounded-xl text-sm font-bold focus:outline-none transition border-3 text-slate-900" placeholder="Type or click to choose your name...">
                    <div id="autocomplete-dropdown" class="absolute left-0 right-0 mt-2 max-h-48 bg-white border-3 border-slate-900 rounded-xl overflow-y-auto hidden z-50 shadow-lg text-slate-900"></div>
                </div>
                
                <div>
                    <label id="label-password" class="block text-xs font-black text-[#4a148c] id-purple-lbl mb-1 uppercase tracking-wider">Secret Passkey</label>
                    <input type="password" id="auth-password" required autocomplete="current-password" class="w-full px-4 py-3 bg-white arcade-input rounded-xl text-sm font-bold focus:outline-none transition border-3 text-slate-900" placeholder="••••••••">
                </div>
                
                <button type="submit" id="auth-submit-btn" class="w-full py-3.5 px-4 bg-[#ab47bc] text-white arcade-btn rounded-xl text-sm font-black shadow-md cursor-pointer border-2 hover:bg-[#8e24aa]">
                    Initialize Profile Dashboard
                </button>
            </form>
            <div id="auth-feedback" class="text-center text-xs font-bold hidden p-3 border-3 border-slate-800 rounded-xl"></div>
        </section>

        <!-- MAIN INTERACTIVE ARCADE DASHBOARD MATRIX -->
        <main id="main-dashboard" class="space-y-6 hidden">
            
            <!-- COHORT ANALYTICS CORE HEADLINE BOARD -->
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                <div class="md:col-span-4 arcade-card bg-[#e8f5e9] p-5 rounded-3xl flex flex-col justify-around gap-3 text-center">
                    <div>
                        <span class="text-2xl">✨</span>
                        <h4 id="spark-kindness-title" class="text-[10px] font-black text-slate-600 uppercase tracking-wider"></h4>
                        <p id="spark-total-messages" class="text-xl font-black text-slate-900">...</p>
                    </div>
                    <div class="w-full h-px bg-slate-300"></div>
                    <div>
                        <span class="text-2xl">👑</span>
                        <h4 id="spark-legendary-title" class="text-[10px] font-black text-slate-600 uppercase tracking-wider"></h4>
                        <p id="spark-legendary-count" class="text-xl font-black text-slate-900">...</p>
                    </div>
                </div>

                <!-- CLASS ARCHETYPE SCOREBOARD -->
                <div class="md:col-span-8 arcade-card bg-slate-900 text-green-400 p-5 rounded-3xl relative border-4 shadow-2xl overflow-hidden">
                    <div class="absolute top-0 right-0 p-2 text-[9px] font-arcade text-slate-700 select-none">VIBE_OS v2.6</div>
                    <div class="flex items-center gap-3 border-b-2 border-slate-700 pb-2 mb-3">
                        <span class="text-xl">🕹️</span>
                        <h3 id="leaderboard-headline-txt" class="text-xs font-arcade uppercase text-[#00ff66] tracking-widest animate-pulse"></h3>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3" id="leaderboard-podiums-container"></div>
                </div>
            </div>

            <!-- INTERFACE ROW SYSTEM PLACEMENT LAYOUTS -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <!-- PILLAR SIDE PANEL DESK -->
                <div class="lg:col-span-5 space-y-6">
                    
                    <!-- PRIVACY VAULT BOX -->
                    <div id="user-vault-card" class="arcade-card bg-white rounded-3xl p-5 space-y-4 relative overflow-hidden transition-all duration-300">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-amber-200 border-3 border-slate-900 shadow-[2px_2px_0px_0px_#1a0f0a] rounded-xl flex items-center justify-center text-xl text-slate-900 font-black" id="user-avatar-char">?</div>
                            <div class="space-y-0.5">
                                <p id="vault-welcome-tag" class="text-[10px] font-black text-slate-500 uppercase tracking-widest"></p>
                                <h2 id="user-display-name" class="text-lg font-black text-slate-900">Student Name</h2>
                            </div>
                        </div>

                        <!-- SECRET SANTA MATCHMAKER COMPONENT -->
                        <div class="p-3 bg-indigo-50 border-2 border-slate-900 shadow-[3px_3px_0px_0px_#1a0f0a] rounded-xl space-y-2">
                            <div class="flex items-center justify-between">
                                <h4 id="santa-title-lbl" class="text-[11px] font-black uppercase text-indigo-900 tracking-wider"></h4>
                                <span class="text-xs">🎲</span>
                            </div>
                            <p id="santa-desc-lbl" class="text-[10px] font-medium text-slate-600 leading-normal"></p>
                            <button onclick="rollRandomClassmateTarget()" id="santa-btn-lbl" class="w-full py-2 bg-indigo-300 text-slate-900 text-xs font-black uppercase tracking-wider rounded-lg border-2 border-slate-900 shadow-[2px_2px_0px_0px_#1a0f0a] hover:translate-y-[1px] active:translate-y-[2px] transition cursor-pointer"></button>
                        </div>

                        <!-- THEME SELECTOR CONTAINER -->
                        <div class="p-3 bg-white/80 border-2 border-slate-900 shadow-[2px_2px_0px_0px_#1a0f0a] rounded-xl space-y-2 text-slate-900">
                            <h4 id="theme-selector-lbl" class="text-[10px] font-black uppercase text-slate-800 tracking-wider"></h4>
                            <div class="grid grid-cols-6 gap-2">
                                <button onclick="updateProfileTheme('aura-green')" class="h-6 rounded-md border-2 border-slate-900 aura-green cursor-pointer transition" title="Mint Green"></button>
                                <button onclick="updateProfileTheme('aura-champagne')" class="h-6 rounded-md border-2 border-slate-900 aura-champagne cursor-pointer transition" title="Champagne Cream"></button>
                                <button onclick="updateProfileTheme('aura-pink')" class="h-6 rounded-md border-2 border-slate-900 aura-pink cursor-pointer transition" title="Sunset Pink"></button>
                                <button onclick="updateProfileTheme('aura-purple')" class="h-6 rounded-md border-2 border-slate-900 aura-purple cursor-pointer transition" title="Royal Purple"></button>
                                <button onclick="updateProfileTheme('aura-red')" class="h-6 rounded-md border-2 border-slate-900 aura-red cursor-pointer transition" title="Crimson Red"></button>
                                <button onclick="updateProfileTheme('aura-darkred')" class="h-6 rounded-md border-2 border-slate-900 aura-darkred cursor-pointer transition" title="Velvet Bordeaux"></button>
                            </div>
                        </div>

                        <!-- DOMINANT VIBE RADAR PROGRESSIVE BARS -->
                        <div class="bg-white/90 border-2 border-slate-900 shadow-[2px_2px_0px_0px_#1a0f0a] p-3 rounded-xl space-y-2 text-slate-900">
                            <h3 id="analytics-title" class="text-[10px] font-black uppercase tracking-wider text-slate-900"></h3>
                            <div id="analytics-bars-container" class="space-y-1.5"></div>
                        </div>

                        <!-- ARCADE ACCOMPLISHMENTS GRID LOG MATRIX -->
                        <div class="bg-slate-900 text-yellow-400 border-2 border-slate-900 shadow-[2px_2px_0px_0px_#1a0f0a] p-3 rounded-xl space-y-2">
                            <div class="flex items-center justify-between border-b border-slate-700 pb-1">
                                <span id="achievements-heading-txt" class="font-arcade text-[7.5px] tracking-widest uppercase text-white">🏆 Achievements Locked: <span id="unlocked-trophies-counter" class="text-green-400">0</span>/35</span>
                            </div>
                            <div id="trophies-scroll-matrix" class="grid grid-cols-7 gap-1 max-h-24 overflow-y-auto p-0.5 bg-black/40 rounded-lg"></div>
                            <div id="selected-trophy-hint-display" class="text-[8px] font-mono font-bold text-slate-400 italic bg-black/20 p-1 rounded text-center"></div>
                        </div>

                        <button onclick="generateKeepsakePDF()" class="w-full py-2.5 px-4 bg-[#eddcd2] text-slate-900 font-black text-xs uppercase tracking-wider rounded-xl arcade-btn cursor-pointer flex items-center justify-center gap-2 border-2">
                            <span>📥</span> <span id="btn-keepsake-txt"></span>
                        </button>
                    </div>

                    <!-- GEOMETRIC COOKIE MINI-GAME INTERFACE -->
                    <div onclick="triggerFortuneCookieGame()" class="arcade-card bg-gradient-to-tr from-amber-100 to-orange-100 rounded-3xl p-5 relative overflow-hidden cursor-pointer text-center group border-4">
                        <div class="flex items-center justify-between mb-2">
                            <h3 id="cookie-header-lbl" class="text-[10px] font-black uppercase tracking-widest text-orange-900 bg-white border-2 border-slate-900 px-2 py-0.5 rounded-md">🥠 FORTUNE MINI-GAME // كبسولة الحظ</h3>
                            <span class="text-xs animate-ping flex h-2 w-2 rounded-full bg-orange-600"></span>
                        </div>
                        <div id="cookie-graphic-node" class="text-5xl my-3 transition-transform duration-300 transform group-hover:scale-110 inline-block select-none">🥠</div>
                        <div id="radiance-display" class="text-xs font-bold text-slate-900 leading-relaxed min-h-[50px] flex flex-col justify-center transition-all duration-500"></div>
                    </div>

                    <!-- ROTATING BALLOT SLOTS ROW LAYOUT -->
                    <div class="arcade-card bg-[#fff9db] rounded-3xl p-5 space-y-4 text-slate-900">
                        <div class="space-y-1">
                            <h3 id="superlative-title" class="text-sm font-black uppercase text-slate-900 tracking-wider"></h3>
                            <p id="superlative-desc" class="text-[11px] font-bold text-slate-700"></p>
                        </div>
                        
                        <div class="space-y-3 bg-white p-3 border-2 border-slate-900 rounded-xl shadow-[3px_3px_0px_0px_#1a0f0a]">
                            <div>
                                <span id="superlative-question" class="text-xs font-black text-slate-900 block mb-1 bg-amber-200 inline-block px-2 py-0.5 rounded border border-slate-400"></span>
                                <select id="superlative-nominee-select" class="w-full p-2 bg-slate-50 border-2 border-slate-900 rounded-lg text-xs font-bold focus:outline-none text-slate-900"></select>
                            </div>
                            <button onclick="castSuperlativeVote()" id="btn-cast-vote" class="w-full py-2 bg-amber-300 text-slate-900 font-black text-xs uppercase tracking-wider rounded-lg border-2 border-slate-900 shadow-[2px_2px_0px_0px_#1a0f0a] transition cursor-pointer">
                                Submit Secret Ballot
                            </button>
                        </div>

                        <div id="superlative-results-box" class="p-3 bg-slate-900 border-2 border-slate-700 rounded-xl font-mono text-[10px] text-green-400 space-y-1">
                            <div id="superlative-archive-headline" class="text-white border-b border-slate-700 pb-1 uppercase font-bold tracking-widest text-[8px]"></div>
                            <div id="superlative-archive-content"></div>
                        </div>
                    </div>

                    <!-- LETTERS STACK FEED -->
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <h3 id="letters-title" class="text-sm font-black text-white uppercase tracking-wider"></h3>
                            <span id="letters-count" class="bg-white text-slate-900 font-black text-xs px-2.5 py-0.5 border-2 border-slate-900 rounded-md">0</span>
                        </div>
                        <div id="received-messages-stack" class="grid grid-cols-1 gap-4 max-h-[500px] overflow-y-auto pr-2 text-slate-900"></div>
                    </div>

                </div>

                <!-- RIGHT MAIN DIRECTORY COLUMN PILLAR -->
                <div class="lg:col-span-7 space-y-6">
                    <div class="arcade-card bg-white rounded-2xl p-4 flex items-center gap-3">
                        <span class="text-lg pl-2">🔍</span>
                        <input type="text" id="grid-search" oninput="filterStudentGrid()" class="w-full bg-transparent border-none text-sm font-bold focus:outline-none placeholder:text-slate-500 text-slate-900">
                    </div>
                    <div id="students-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[1200px] overflow-y-auto p-1 text-slate-900"></div>
                </div>
            </div>

        </main>

    </div>

    <!-- TRANSMISSION CAPSULE DIALOG MODAL LAYOUT SHEET SHEET -->
    <div id="envelope-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-xs hidden opacity-0 transition-opacity duration-300">
        <div class="arcade-card w-full max-w-xl rounded-3xl bg-white p-6 md:p-8 transform scale-95 transition-transform duration-300 space-y-6 max-h-[90vh] overflow-y-auto relative border-4 text-slate-900">
            
            <button onclick="closeEnvelopeModal()" class="absolute top-4 right-4 rtl:left-4 rtl:right-auto text-slate-800 hover:text-rose-600 font-black text-2xl cursor-pointer border-2 border-slate-900 w-9 h-9 flex items-center justify-center rounded-lg bg-white">×</button>
            
            <div class="space-y-1">
                <span id="modal-badge" class="text-[10px] font-black uppercase tracking-widest text-slate-900 bg-blue-200 border border-slate-800 px-2 py-0.5 rounded">PEER TRANSMISSION</span>
                <h3 class="text-xl font-black text-slate-900">
                    <span id="modal-title-prefix">To:</span> <span id="modal-recipient-name" class="underline decoration-wavy decoration-pink-500">Student Name</span>
                </h3>
            </div>

            <!-- ONE-CLICK QUICK ACTIONS LAUNCH MATRIX -->
            <div class="p-4 bg-green-50 border-3 border-slate-900 shadow-[4px_4px_0px_0px_#1a0f0a] rounded-2xl space-y-2">
                <h4 id="quick-action-headline" class="text-xs font-black text-emerald-900 uppercase tracking-wide flex items-center gap-1"></h4>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <button id="quick-btn-0" onclick="fireQuickVibeTransmission(0)" class="p-2 bg-white hover:bg-yellow-100 border-2 border-slate-900 rounded-xl text-xs font-black text-slate-800 cursor-pointer active:scale-95 transition"></button>
                    <button id="quick-btn-1" onclick="fireQuickVibeTransmission(1)" class="p-2 bg-white hover:bg-blue-100 border-2 border-slate-900 rounded-xl text-xs font-black text-slate-800 cursor-pointer active:scale-95 transition"></button>
                    <button id="quick-btn-2" onclick="fireQuickVibeTransmission(2)" class="p-2 bg-white hover:bg-pink-100 border-2 border-slate-900 rounded-xl text-xs font-black text-slate-800 cursor-pointer active:scale-95 transition"></button>
                    <button id="quick-btn-3" onclick="fireQuickVibeTransmission(3)" class="p-2 bg-white hover:bg-emerald-100 border-2 border-slate-900 rounded-xl text-xs font-black text-slate-800 cursor-pointer active:scale-95 transition"></button>

        function evaluateThreeDayBallotRotationPhase() {
            const baseDeploymentAnchorTimestamp = 1779472800000; 
            const activeLiveTimestampNow = Date.now();
            const elapsedMillisecondsCount = activeLiveTimestampNow - baseDeploymentAnchorTimestamp;
            
            const threeDaysInMilliseconds = 3 * 24 * 60 * 60 * 1000;
            let activeCalculatedPhaseIndex = Math.floor(elapsedMillisecondsCount / threeDaysInMilliseconds);
            if(activeCalculatedPhaseIndex < 0) activeCalculatedPhaseIndex = 0;
            
            const targetPhaseObject = SUPERLATIVE_TIMELINE_PHASES[activeCalculatedPhaseIndex % SUPERLATIVE_TIMELINE_PHASES.length];
            const displayQuestionEl = document.getElementById("superlative-question");
            if(displayQuestionEl) {
                displayQuestionEl.innerText = targetPhaseObject.prompt[currentLanguage] || targetPhaseObject.prompt['en'];
            }
            
            const historicalArchivedPhaseIndex = (activeCalculatedPhaseIndex - 1 + SUPERLATIVE_TIMELINE_PHASES.length) % SUPERLATIVE_TIMELINE_PHASES.length;
            const historicalArchiveObject = SUPERLATIVE_TIMELINE_PHASES[historicalArchivedPhaseIndex];
            
            const archiveContentEl = document.getElementById("superlative-archive-content");
            if(archiveContentEl) {
                archiveContentEl.innerText = historicalArchiveObject.archive[currentLanguage] || historicalArchiveObject.archive['en'];
            }
        }

        async function fetchAllStudentsMetadata() {
            try {
                const { data, error } = await supabaseClient
                    .from('Students')
                    .select('id, Full_name, Password')
                    .order('Full_name', { ascending: true });

                if (!error && data) {
                    globalStudentsList = data;
                    handleAutocompleteSearch("");
                    populateSuperlativeDropdown(); 
                }
            } catch (err) { console.error(err); }
        }

        function handleAutocompleteSearch(query) {
            const dropdown = document.getElementById("autocomplete-dropdown");
            if(!dropdown) return;
            dropdown.innerHTML = "";
            const txt = query.toLowerCase().trim();
            const matchingRows = globalStudentsList.filter(s => s.Full_name.toLowerCase().includes(txt));

            if(matchingRows.length === 0) {
                dropdown.classList.add("hidden");
                return;
            }

            matchingRows.forEach(student => {
                const rowItem = document.createElement("div");
                rowItem.className = "px-4 py-2.5 hover:bg-purple-100 font-bold text-xs text-slate-800 cursor-pointer border-b border-slate-100 transition-colors";
                rowItem.innerText = student.Full_name;
                rowItem.onclick = () => {
                    document.getElementById("auth-fullname-input").value = student.Full_name;
                    dropdown.classList.add("hidden");
                };
                dropdown.appendChild(rowItem);
            });
            dropdown.classList.remove("hidden");
        }

        async function handleAuthenticationPipeline(event) {
            event.preventDefault(); 
            
            const fullNameInput = document.getElementById("auth-fullname-input").value.trim();
            const passwordInput = document.getElementById("auth-password").value;
            const feedbackEl = document.getElementById("auth-feedback");

            feedbackEl.className = "text-center text-xs font-bold p-3 bg-purple-100 text-purple-900 border-3 border-slate-900 block animate-pulse";
            feedbackEl.innerText = "Querying credentials registry matrix checks...";

            const matchedUserRecord = globalStudentsList.find(s => s.Full_name.toLowerCase() === fullNameInput.toLowerCase());

            if (!matchedUserRecord) {
                feedbackEl.className = "text-center text-xs font-bold p-3 bg-rose-100 text-rose-900 border-3 border-slate-900 block";
                feedbackEl.innerText = LOCALIZATION_MAP[currentLanguage].authNotFound;
                return;
            }

            try {
                if (!matchedUserRecord.Password || matchedUserRecord.Password.trim() === "") {
                    const { error: updateError } = await supabaseClient
                        .from('Students')
                        .update({ Password: passwordInput })
                        .eq('id', matchedUserRecord.id);

                    if (updateError) throw updateError;

                    matchedUserRecord.Password = passwordInput;
                    feedbackEl.className = "text-center text-xs font-bold p-3 bg-emerald-100 text-emerald-900 border-3 border-slate-900 block";
                    feedbackEl.innerText = LOCALIZATION_MAP[currentLanguage].authNewPass;
                    proceedToDashboard(matchedUserRecord);
                } else {
                    if (matchedUserRecord.Password === passwordInput) {
                        feedbackEl.className = "text-center text-xs font-bold p-3 bg-emerald-100 text-emerald-900 border-3 border-slate-900 block";
                        feedbackEl.innerText = LOCALIZATION_MAP[currentLanguage].authSuccess;
                        proceedToDashboard(matchedUserRecord);
                    } else {
                        feedbackEl.className = "text-center text-xs font-bold p-3 bg-rose-100 text-rose-900 border-3 border-slate-900 block";
                        feedbackEl.innerText = LOCALIZATION_MAP[currentLanguage].authWrong;
                    }
                }
            } catch (err) {
                console.error(err);
                feedbackEl.className = "text-center text-xs font-bold p-3 bg-rose-100 text-rose-900 border-3 border-slate-900 block";
                feedbackEl.innerText = "Database sync failed.";
            }
        }

        // 5. FIXED: Roll random classmate challenges text string localizes safely on trigger alert
        function rollRandomClassmateTarget() {
            const validTargetsList = globalStudentsList.filter(s => s.Full_name !== loggedInUser.Full_name);
            if(validTargetsList.length === 0) return;

            const randomClassmateIndex = Math.floor(Math.random() * validTargetsList.length);
            const rolledTargetStudent = validTargetsList[randomClassmateIndex];

            let SantaRollsCounter = parseInt(localStorage.getItem(`santa_rolls_${loggedInUser.id}`) || "0");
            SantaRollsCounter++;
            localStorage.setItem(`santa_rolls_${loggedInUser.id}`, SantaRollsCounter);
            
            if(SantaRollsCounter >= 1) triggerAchievementUnlockCheck(14);
            if(SantaRollsCounter >= 5) triggerAchievementUnlockCheck(15);

            const lastRolledName = localStorage.getItem(`last_rolled_name_${loggedInUser.id}`);
            if(lastRolledName === rolledTargetStudent.Full_name) {
                triggerAchievementUnlockCheck(29);
            }
            localStorage.setItem(`last_rolled_name_${loggedInUser.id}`, rolledTargetStudent.Full_name);

            openEnvelopeModalFor(btoa(unescape(encodeURIComponent(rolledTargetStudent.Full_name))));
        }

        function triggerAchievementUnlockCheck(achievementID) {
            if(!loggedInUser) return;
            const trackingKey = `smile_trophies_unlocked_${loggedInUser.id}`;
            let currentUnlockedArray = [];
            try { currentUnlockedArray = JSON.parse(localStorage.getItem(trackingKey)) || []; } catch(e){}

            if(currentUnlockedArray.includes(achievementID)) return; 

            currentUnlockedArray.push(achievementID);
            localStorage.setItem(trackingKey, JSON.stringify(currentUnlockedArray));

            if(currentUnlockedArray.length >= 15) triggerAchievementUnlockCheck(34);
            confetti({ particleCount: 30, scalar: 1.1, colors: ['#ffeb3b', '#673ab7'] });
            renderAchievementsArcadeGridHTML();
        }

        function renderVibeAnalyticsGraph(messagesArray) {
            const graphContainer = document.getElementById("analytics-bars-container");
            if(!graphContainer) return;
            graphContainer.innerHTML = "";
            
            // Substring counter arrays allocation mapping
            const numericalFrequenciesAccumulator = [0, 0, 0, 0, 0, 0, 0, 0];
            let rawTotalTagsAnalyzedCount = 0;

            messagesArray.forEach(msg => {
                try {
                    const parsedTagsList = Array.isArray(msg.vibe_tags) ? msg.vibe_tags : JSON.parse(msg.vibe_tags);
                    if(Array.isArray(parsedTagsList)) {
                        parsedTagsList.forEach(singleTagString => {
                            const normalizedText = singleTagString.toLowerCase();
                            
                            // Scan normalized keyword profiles arrays across multilingual dialects definitions
                            for (let i = 0; i < RADAR_SUBSTRING_COMPILER_MAP.length; i++) {
                                const mappingObj = RADAR_SUBSTRING_COMPILER_MAP[i];
                                const patternMatched = mappingObj.keywords.some(keyword => normalizedText.includes(keyword));
                                
                                if(patternMatched) {
                                    numericalFrequenciesAccumulator[mappingObj.id]++;
                                    rawTotalTagsAnalyzedCount++;
                                    break; // Skip matching current word redundancy structures safely
                                }
                            }
                        });
                    }
                } catch(e){ console.error("Radar compilation failure item state: ", e); }
            });

            const currentActiveLabelsPool = VIBE_OPTIONS_POOL[currentLanguage] || VIBE_OPTIONS_POOL['en'];
            
            // Generate progress pills natively into DOM layout strings pairs
            for (let i = 0; i < 8; i++) {
                const countValue = numericalFrequenciesAccumulator[i];
                const dynamicPercentageWidth = rawTotalTagsAnalyzedCount > 0 ? Math.round((countValue / rawTotalTagsAnalyzedCount) * 100) : 0;

                const progressRowMarkup = document.createElement("div");
                progressRowMarkup.className = "space-y-1";
                progressRowMarkup.innerHTML = `
                    <div class="flex justify-between text-[10px] font-black text-slate-700">
                        <span>${currentActiveLabelsPool[i]}</span>
                        <span>${countValue}</span>
                    </div>
                    <div class="w-full bg-slate-100 h-3 rounded-md border border-slate-900 overflow-hidden shadow-inner relative">
                        <div class="bg-pink-400 h-full border-r border-slate-900 transition-all duration-1000" style="width: ${rawTotalTagsAnalyzedCount > 0 ? dynamicPercentageWidth : 5}%"></div>
                    </div>
                `;
                graphContainer.appendChild(progressRowMarkup);
            }
        }

        function generateKeepsakePDF() {
            if (activeReceivedMessagesCache.length === 0) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

            doc.rect(5, 5, 200, 287);
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(22);
            doc.text("JUST SMILE // KEEPSAKE ARCHIVE", 105, 25, { align: "center" });

            let cursorY = 60;
            activeReceivedMessagesCache.forEach((envelope) => {
                if (cursorY > 250) { doc.addPage(); cursorY = 25; }
                let cleanBodyText = envelope.content;
                if (cleanBodyText.includes("__LOCK__:")) {
                    cleanBodyText = cleanBodyText.split("__:").slice(2).join("__:");
                }
                const strippedText = cleanBodyText.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD00-\uDFFF]/g, '');
                const splitLines = doc.splitTextToSize(`"${strippedText}"`, 160);
                const blockH = (splitLines.length * 5) + 12;

                doc.rect(18, cursorY, 174, blockH);
                doc.text(splitLines, 22, cursorY + 6);
                cursorY += blockH + 6;
            });
            
            doc.save("Just_Smile_Keepsake.pdf");
            triggerAchievementUnlockCheck(13); 
        }
